<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tennis Dodge Game</title>

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    background: #1b5e20;
    color: white;
}

canvas {
    background: #0d3b0d;
    display: block;
    margin: 20px auto;
    border: 3px solid white;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}

#info {
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🎾 Tennis Dodge Game</h1>
<p>Use LEFT and RIGHT arrows</p>

<p id="info">Score: 0 | Lives: 2</p>

<canvas id="game" width="400" height="500"></canvas>

<br>
<button onclick="restartGame()">Restart Game</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, balls, score, lives, frame, gameOver;

function initGame() {
    player = {
        x: 180,
        y: 460,
        w: 40,
        h: 10,
        speed: 8
    };

    balls = [];
    score = 0;
    lives = 2;
    frame = 0;
    gameOver = false;

    document.getElementById("info").innerText =
        "Score: 0 | Lives: 2";
}

initGame();

// controls
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") player.x -= player.speed;
    if (e.key === "ArrowRight") player.x += player.speed;
});

// spawn balls
function spawnBall() {
    balls.push({
        x: Math.random() * 380,
        y: 0,
        r: 10,
        speed: 2 + Math.random() * 3
    });
}

function drawPlayer() {
    ctx.fillStyle = "white";
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

function drawBalls() {
    balls.forEach(b => {
        ctx.beginPath();
        ctx.fillStyle = "yellow";
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.moveTo(b.x - 5, b.y);
        ctx.lineTo(b.x + 5, b.y);
        ctx.stroke();
    });
}

function updateBalls() {
    balls.forEach(b => {
        b.y += b.speed;

        // hit player
        if (
            b.y + b.r > player.y &&
            b.x > player.x &&
            b.x < player.x + player.w
        ) {
            lives--;
            b.y = 600;

            if (lives <= 0) {
                gameOver = true;
            }
        }

        // missed ball = score
        if (b.y > 500) {
            score++;
            b.y = 600;
        }
    });

    balls = balls.filter(b => b.y < 600);
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPlayer();
    drawBalls();
    updateBalls();

    if (!gameOver) {
        if (frame % 60 === 0) spawnBall();
        frame++;
    } else {
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("Game Over", 120, 250);
        ctx.font = "18px Arial";
        ctx.fillText("Press Restart to play again", 90, 280);
    }

    document.getElementById("info").innerText =
        "Score: " + score + " | Lives: " + lives;

    requestAnimationFrame(loop);
}

// restart function
function restartGame() {
    initGame();
}

loop();
</script>

</body>
</html>
